<!DOCTYPE html>
<html>
<head>
    <title>AI Interview Analyzer</title>

    <!-- Google Font -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;600&display=swap" rel="stylesheet">

    <style>
        body {
            font-family: 'Poppins', sans-serif;

            /*  Background Image + Overlay */
            background: 
                linear-gradient(rgba(0,0,0,0.6), rgba(0,0,0,0.6)),
                url('https://images.unsplash.com/photo-1553877522-43269d4ea984');

            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;

            margin: 0;
            height: 100vh;

            display: flex;
            align-items: center;
            justify-content: center;
        }

        /*  Glass Container */
        .container {
            width: 90%;
            max-width: 800px;
            padding: 30px;
            border-radius: 20px;
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(20px);
            box-shadow: 0 15px 40px rgba(0,0,0,0.4);
            text-align: center;
            color: white;
            animation: fadeIn 1s ease;
        }

        h2 {
            margin-bottom: 20px;
        }

        /* 🔥 Input Row */
        .form-group {
            display: flex;
            gap: 10px;
        }

        .form-group input {
            width: 50%;
        }

        input, textarea {
            width: 100%;
            padding: 12px;
            margin-top: 12px;
            border-radius: 10px;
            border: none;
            outline: none;
            font-size: 14px;
            background: rgba(255,255,255,0.2);
            color: white;
        }

        input::placeholder, textarea::placeholder {
            color: #ddd;
        }

        input:focus, textarea:focus {
            background: rgba(255,255,255,0.3);
        }

        /* 🎯 Buttons Row */
        .btn-group {
            display: flex;
            gap: 10px;
            margin-top: 15px;
        }

        .btn {
            flex: 1;
            padding: 12px;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            font-weight: 500;
            transition: 0.3s;
        }

        .mic-btn {
            background: linear-gradient(45deg, #ff416c, #ff4b2b);
            color: white;
        }

        .analyze-btn {
            background: linear-gradient(45deg, #00c9ff, #92fe9d);
            color: black;
        }

        .download-btn {
            background: linear-gradient(45deg, #434343, #000000);
            color: white;
        }

        .btn:hover {
            transform: scale(1.05);
        }

        /* 🎤 Mic Animation */
        .mic-animation {
            margin-top: 10px;
            font-size: 16px;
            color: #ff4b2b;
            display: none;
            animation: pulse 1s infinite;
        }

        @keyframes pulse {
            0% {transform: scale(1);}
            50% {transform: scale(1.2);}
            100% {transform: scale(1);}
        }

        /* 📊 Output */
        .output {
            margin-top: 20px;
            text-align: left;
            padding: 20px;
            border-radius: 12px;
            background: rgba(255,255,255,0.15);
            color: white;
            animation: slideUp 0.5s ease;
        }

        a {
            color: #00f2fe;
        }

        /* ✨ Animations */
        @keyframes fadeIn {
            from {opacity: 0; transform: translateY(20px);}
            to {opacity: 1; transform: translateY(0);}
        }

        @keyframes slideUp {
            from {opacity: 0; transform: translateY(20px);}
            to {opacity: 1; transform: translateY(0);}
        }
    </style>
</head>

<body>

<div class="container">

    <h2>🎯 AI Interview Analyzer</h2>

    <!-- Name + Role -->
    <div class="form-group">
        <input type="text" id="name" placeholder="Enter Name">
        <input type="text" id="role" placeholder="Enter Role">
    </div>

    <textarea id="text" rows="5" placeholder="Your answer will appear here..."></textarea>

    <!-- Buttons -->
    <div class="btn-group">
        <button class="btn mic-btn" onclick="startListening()">🎤 Speak</button>
        <button class="btn analyze-btn" onclick="analyze()">Analyze</button>
        <button class="btn download-btn" onclick="downloadResume()">Download</button>
    </div>

    <div id="micStatus" class="mic-animation">🎤 Recording...</div>

    <div id="output" class="output"></div>

</div>

<!-- 🎤 Voice -->
<script>
function startListening() {

    if (!('webkitSpeechRecognition' in window)) {
        alert("Use Chrome!");
        return;
    }

    const recognition = new webkitSpeechRecognition();
    recognition.lang = "en-IN";

    document.getElementById("micStatus").style.display = "block";

    recognition.onresult = function(event) {
        document.getElementById("text").value = event.results[0][0].transcript;
        document.getElementById("micStatus").style.display = "none";
    };

    recognition.start();
}
</script>

<!--  Analyze -->
<script>
async function analyze() {

    const name = document.getElementById("name").value;
    const role = document.getElementById("role").value;
    const text = document.getElementById("text").value;

    if (!text) {
        alert("Enter or speak first!");
        return;
    }

    document.getElementById("output").innerHTML = "⏳ Analyzing...";

    const response = await fetch("/analyze", {
        method: "POST",
        headers: {
            "Content-Type": "application/json"
        },
        body: JSON.stringify({ name, role, text })
    });

    const data = await response.json();

    let linksHTML = "";

    if (data.learning_links && data.learning_links.length > 0) {
        linksHTML = "<b>🎥 Learning:</b><br>";
        data.learning_links.forEach(item => {
            linksHTML += `<a href="${item[1]}" target="_blank">Learn ${item[0]}</a><br>`;
        });
    }

    document.getElementById("output").innerHTML = `
        <p><b>Score:</b> ${data.score}/10</p>
        <p><b>Skills:</b> ${data.skills.join(", ")}</p>
        <p><b>Feedback:</b><br>${data.feedback.join("<br>")}</p>
        <p><b>Recommendations:</b><br>${data.recommendations.join("<br>")}</p>
        <p>${linksHTML}</p>
    `;
}
</script>

<!-- Download -->
<script>
function downloadResume() {
    window.location.href = "/download_resume";
}
</script>

</body>
</html>
